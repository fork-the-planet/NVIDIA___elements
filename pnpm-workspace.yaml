  vitest: 4.1.4
  zod: 4.3.6

ignorePatchFailures: false

minimumReleaseAge: 1140

minimumReleaseAgeExclude:
  - playwright
  - playwright-core
  - typescript
  - vite

onlyBuiltDependencies:
  - '@bundled-es-modules/glob'
  - '@parcel/watcher'
  - esbuild
  - hugo-bin
  - lmdb
  - msgpackr-extract
  - rs-module-lexer
  - sharp
  - style-dictionary

packageManagerStrictVersion: true

patchedDependencies:
  monaco-editor: patches/monaco-editor.patch

useNodeVersion: 24.12.0

verifyDepsBeforeRun: install
