packages:
  - projects/code
  - projects/starters
  - projects/starters/angular
  - projects/starters/bundles
  - projects/starters/eleventy
  - projects/starters/eleventy-ssr
  - projects/starters/go
  - projects/starters/go-htmx
  - projects/starters/hugo
  - projects/starters/importmaps
  - projects/starters/lit-library
  - projects/starters/mcp-app
  - projects/starters/mpa
  - projects/starters/nextjs
  - projects/starters/nuxt
  - projects/starters/react
  - projects/starters/scoped-registry
  - projects/starters/solidjs
  - projects/starters/svelte
  - projects/starters/typescript
  - projects/starters/vue
  - projects/site
  - projects/cli
  - projects/code
  - projects/lint
  - projects/markdown
  - projects/media
  - projects/monaco
  - projects/pages
  - projects/create
  - projects/core
  - projects/forms
  - projects/styles
  - projects/themes
  - projects/internals/eslint
  - projects/internals/metadata
  - projects/internals/patterns
  - projects/internals/testing
  - projects/internals/vite
  - projects/internals/tools

overrides:
  '@lit-labs/ssr-dom-shim': 1.6.0
  'archiver>glob': 'catalog:'
  'dts-bundle-generator>typescript': 'catalog:'
  devalue: 5.8.1
  eslint: 'catalog:'
  fast-uri: 3.1.2
  liquidjs: 10.26.0
  shell-quote: 1.8.4
  tmp: 0.2.6

# version ranges for published package dependencies
catalogs:
  publish:
    '@lit-labs/scoped-registry-mixin': ^1.0.4
    '@webcomponents/scoped-custom-element-registry': ^0.0.10
    construct-style-sheets-polyfill: ^3.1.0
    element-internals-polyfill: ^3.0.2
    eslint: '>= 10' # peer dependency for eslint
    formdata-polyfill: ^4.0.10
    highlight.js: ^11.11.1
    lit: ^3.3.3
    lit-html: ^3.3.3
    markdown-it: ^14.3.0
    minisearch: 7.2.0

catalog:
  esbuild: 0.28.1
  '@11ty/eleventy': 3.1.6
  '@11ty/eleventy-plugin-syntaxhighlight': 5.0.2
  '@11ty/eleventy-plugin-vite': 8.0.0
  '@custom-elements-manifest/analyzer': 0.11.0
  '@eslint/css': 1.2.0
  '@eslint/js': 10.0.1
  '@eslint/json': 1.2.0
  '@html-eslint/eslint-plugin': 0.61.0
  '@html-eslint/parser': 0.61.0
  '@lit-labs/eleventy-plugin-lit': 1.0.6
  '@lit-labs/ssr': 4.1.0
  '@lit-labs/ssr-client': 1.1.8
  '@lit-labs/ssr-react': 0.3.4
  '@lit-labs/virtualizer': 2.1.1
  '@lit/reactive-element': 2.1.2
  '@modelcontextprotocol/ext-apps': 1.7.3
  '@modelcontextprotocol/sdk': 1.29.0
  '@types/node': 25.6.2
  '@types/react': 19.2.14
  '@types/react-dom': 19.2.3
  '@vitest/browser': 4.1.10
  '@vitest/browser-playwright': 4.1.10
  '@vitest/coverage-istanbul': 4.1.10
  axe-core: 4.11.0
  eslint: 10.6.0
  glob: 13.0.6
  highlight.js: 11.11.1
  lighthouse: 13.0.3
  lit: 3.3.3
  lit-element: 4.2.2
  lit-html: 3.3.3
  markdown-it: 14.3.0
  markdown-it-link-attributes: 4.0.1
  minisearch: 7.2.0
  playwright: 1.61.1
  postcss: 8.5.15
  publint: 0.3.21
  react: 19.2.5
  react-dom: 19.2.5
  rollup-plugin-html-literals: 2.0.1
  stylelint: 17.14.0
  stylelint-config-standard: 40.0.0
  ts-morph: 26.0.0
  typescript: 6.0.3
  typescript-7: npm:typescript@7.0.2
  typescript-eslint: 8.60.0
  vite: 8.1.4
  vitest: 4.1.10
  zod: 4.4.3

minimumReleaseAge: 1140

minimumReleaseAgeExclude:
  - playwright
  - playwright-core
  - publint
  - typescript
  - vite

allowBuilds:
  '@modelcontextprotocol/ext-apps': true
  '@bundled-es-modules/glob': true
  '@parcel/watcher': true
  bun: true
  esbuild: true
  hugo-bin: true
  lmdb: true
  msgpackr-extract: true
  rs-module-lexer: true
  sharp: true
  style-dictionary: true

patchedDependencies:
  monaco-editor: patches/monaco-editor.patch

verifyDepsBeforeRun: install
