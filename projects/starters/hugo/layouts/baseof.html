<!doctype html>
<html lang="{{ .Site.Language.Lang }}" nve-theme="dark" nve-transition="auto">
  <head>
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    {{ if in .Site.BaseURL "localhost" }}<base href="/" />{{ else }}<base href="{{ .Site.BaseURL }}starters/hugo/" />{{ end }}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ .Description | default .Site.Params.description }}" />
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon" />
    <link rel="stylesheet" type="text/css" href="node_modules/@nvidia-elements/styles/dist/bundles/index.css" />
    <link rel="stylesheet" type="text/css" href="node_modules/@nvidia-elements/themes/dist/bundles/index.css" />
    <link rel="stylesheet" type="text/css" href="node_modules/@nvidia-elements/themes/dist/fonts/inter.css" />  
    <link rel="stylesheet" type="text/css" href="./index.css" />
    <script type="module" src="node_modules/@nvidia-elements/core/dist/bundles/index.js"></script>
    <script type="module" src="node_modules/@nvidia-elements/code/dist/bundles/index.js"></script>
  </head>
  <body nve-text="body">
    <nve-page>
      <nve-page-header slot="header">
        <nve-logo slot="prefix" size="sm" color="brand-green">NV</nve-logo>
        <a slot="prefix" href="https://NVIDIA.github.io/elements/">Elements</a>
        <nve-button container="flat"
          ><a href="https://NVIDIA.github.io/elements/docs/integrations/angular/" target="_blank"
            >Catalog</a
          ></nve-button
        >
        <nve-button container="flat"
          ><a href="https://NVIDIA.github.io/elements/starters/">Starters</a></nve-button
        >
        <nve-button container="flat"
          ><a href="https://github.com/NVIDIA/elements/" target="_blank">Gitlab</a></nve-button
        >
      </nve-page-header>
      <nve-page-panel slot="left" size="sm">
        <nve-page-panel-content>
          <nve-menu>
            <nve-menu-item><a target="_blank" href="https://NVIDIA.github.io/elements/docs/integrations/hugo/">Documentation</a></nve-menu-item>
            <nve-menu-item><a target="_blank" href="https://github.com/NVIDIA/elements/tree/main/projects/starters/hugo">Source</a></nve-menu-item>
            <nve-menu-item><a download href="https://NVIDIA.github.io/elements/starters/download/hugo.zip">Download</a></nve-menu-item>
          </nve-menu>
        </nve-page-panel-content>
      </nve-page-panel>
      <main nve-layout="column gap:xl pad:lg full">{{- block "main" . }}{{- end }}</main>
    </nve-page>
  </body>
</html>
