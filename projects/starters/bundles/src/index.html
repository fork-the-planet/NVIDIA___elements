<!doctype html>
<html lang="en" nve-theme="dark" nve-transition="auto">
  <head>
    <title>Elements + Static Bundles</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple starter using Elements and JS Bundles." />
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon" />
    <style>
      @import './node_modules/@nvidia-elements/styles/dist/bundles/index.css';
      @import './node_modules/@nvidia-elements/themes/dist/bundles/index.css';
      @import './node_modules/@nvidia-elements/themes/dist/fonts/inter.css';
      @import './node_modules/@nvidia-elements/monaco/dist/bundles/index.css';
    </style>
    <script type="module">
      import './node_modules/@nvidia-elements/core/dist/bundles/index.js';
      import './node_modules/@nvidia-elements/monaco/dist/bundles/index.js';
    </script>
  </head>
  <body nve-text="body">
    <nve-page>
      <nve-page-header slot="header">
        <nve-logo slot="prefix" size="sm" color="brand-green">NV</nve-logo>
        <a slot="prefix" href="https://NVIDIA.github.io/elements/">Elements</a>
        <nve-button container="flat"><a href="https://NVIDIA.github.io/elements/docs/integrations/angular/" target="_blank">Catalog</a></nve-button>
        <nve-button container="flat"><a href="https://NVIDIA.github.io/elements/starters/">Starters</a></nve-button>
        <nve-button container="flat"><a href="https://github.com/NVIDIA/elements/" target="_blank">Gitlab</a></nve-button>
      </nve-page-header>
      <nve-page-panel slot="left" size="sm">
        <nve-page-panel-content>
          <nve-menu>
            <nve-menu-item><a target="_blank" href="https://NVIDIA.github.io/elements/docs/integrations/bundles/">Documentation</a></nve-menu-item>
            <nve-menu-item><a target="_blank" href="https://github.com/NVIDIA/elements/tree/main/projects/starters/bundles">Source</a></nve-menu-item>
            <nve-menu-item><a download href="https://NVIDIA.github.io/elements/starters/download/bundles.zip">Download</a></nve-menu-item>
          </nve-menu>
        </nve-page-panel-content>
      </nve-page-panel>
      <main nve-layout="column gap:lg pad:lg">
        <div nve-layout="row gap:sm align:vertical-center">
          <img src="https://NVIDIA.github.io/elements/static/images/integrations/javascript.svg" width="36px" height="36px" alt="javascript logo">
          <h1 nve-text="heading xl">Bundles</h1>
        </div>
        <p nve-text="body">A simple starter using Elements and pre-built static bundles.</p>
        <div nve-layout="row gap:xs">
          <a nve-text="body sm" target="_blank" href="https://NVIDIA.github.io/elements/docs/integrations/bundles/">Documentation</a>
          <a nve-text="body sm" target="_blank" href="https://github.com/NVIDIA/elements/tree/main/projects/starters/bundles">Source</a>
          <a nve-text="body sm" download href="https://NVIDIA.github.io/elements/starters/download/bundles.zip">Download</a>
        </div>
        <nve-monaco-input language="typescript" value="console.log('Hello, world!');"></nve-monaco-input>
        <script type="module">
          const input = document.querySelector("nve-monaco-input");
          input.addEventListener("input", () => console.log("input: ", input.value));
          input.addEventListener("change", () => console.log("change: ", input.value));
        </script>
      </main>
    </nve-page>
  </body>
</html>
