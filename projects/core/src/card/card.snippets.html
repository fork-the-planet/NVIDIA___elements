<template name="Card" prefix="card" description="Basic Card with header and footer" type="pattern">
  <nve-card>
    <nve-card-header>
      <div>
        <h2>${1:Title}</h2>
        <p>${2:Sub Title}</p>
      </div>
    </nve-card-header>
    <nve-card-content>
      ${3:
      <p>card content</p>
      }
    </nve-card-content>
    <nve-card-footer>
      <nve-button style="margin-left: auto">Action</nve-button>
    </nve-card-footer>
  </nve-card>
</template>

<template
  name="Media Card"
  prefix="media-card"
  description="Basic media Card with card content and card footer"
  type="pattern">
  <nve-card style="height: 100%; width: 100%;">
    <img
      alt="example visualization for media card demo"
      loading="lazy"
      style="width: 100%; height: 100%; object-fit: cover;" />
    <nve-card-content>
      ${1:
      <p>•︎•︎•︎ •︎•︎•︎ •︎•︎•︎</p>
      }
    </nve-card-content>
    <nve-card-footer>
      <div nve-layout="grid span-items:6 gap:xs">
        <nve-button>${2:•︎•︎•︎•︎•︎•︎}</nve-button>
        <nve-button>${3:•︎•︎•︎•︎•︎•︎}</nve-button>
      </div>
    </nve-card-footer>
  </nve-card>
</template>
